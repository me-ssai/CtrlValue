name: CI — Frontend

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/ci-frontend.yml"

jobs:
  frontend-build:
    name: frontend-build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/ctrlvalue/package-lock.json

      - name: Install dependencies
        working-directory: frontend/ctrlvalue
        run: npm ci

      - name: Lint
        working-directory: frontend/ctrlvalue
        run: npx ng lint

      - name: Build (production)
        working-directory: frontend/ctrlvalue
        run: npx ng build --configuration production
