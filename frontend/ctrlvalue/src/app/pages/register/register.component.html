<div class="d-flex align-items-center justify-content-center min-vh-100 position-relative overflow-hidden p-3">
    <div class="auth-glow"></div>

    <mat-card class="auth-card animate-fade-in-up">
        <mat-card-header class="auth-header">
            <div class="auth-logo auth-logo--brand">
                <img src="assets/logo-big-light-bg.svg" alt="Ctrl Value" class="auth-brand-logo" />
            </div>
            <mat-card-title>Create your account</mat-card-title>
            <mat-card-subtitle>Start managing your wealth today</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
            <form (ngSubmit)="onSubmit()" class="auth-form">
                <div class="row g-3">
                    <div class="col-6">
                        <mat-form-field appearance="outline" class="w-100">
                            <mat-label>First Name</mat-label>
                            <input matInput [(ngModel)]="firstName" name="firstName" required>
                            <mat-icon matPrefix>person</mat-icon>
                        </mat-form-field>
                    </div>
                    <div class="col-6">
                        <mat-form-field appearance="outline" class="w-100">
                            <mat-label>Last Name</mat-label>
                            <input matInput [(ngModel)]="lastName" name="lastName" required>
                        </mat-form-field>
                    </div>
                </div>

                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Email</mat-label>
                    <input matInput type="email" [(ngModel)]="email" name="email" placeholder="you@example.com"
                        autocomplete="email" required>
                    <mat-icon matPrefix>email</mat-icon>
                </mat-form-field>

                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Password</mat-label>
                    <input matInput type="password" [(ngModel)]="password" name="password" placeholder="••••••••"
                        autocomplete="new-password" required>
                    <mat-icon matPrefix>lock</mat-icon>
                    <mat-hint>Minimum 8 characters</mat-hint>
                </mat-form-field>

                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Confirm Password</mat-label>
                    <input matInput type="password" [(ngModel)]="confirmPassword" name="confirmPassword"
                        placeholder="••••••••" autocomplete="new-password" required>
                    <mat-icon matPrefix>lock</mat-icon>
                </mat-form-field>

                <button mat-raised-button color="primary" type="submit" class="w-100 auth-submit" [disabled]="loading">
                    <mat-icon *ngIf="loading">refresh</mat-icon>
                    <span *ngIf="!loading">Create Account</span>
                    <span *ngIf="loading">Creating account...</span>
                </button>
            </form>
        </mat-card-content>

        <mat-card-footer class="auth-footer">
            <p>Already have an account? <a routerLink="/login">Sign in</a></p>
        </mat-card-footer>
    </mat-card>
</div>
