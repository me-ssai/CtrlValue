<div class="page-container">
    <div class="page-header">
        <h1><mat-icon>category</mat-icon> Categories</h1>
        <button mat-raised-button color="primary" (click)="createCategory()">
            <mat-icon>add</mat-icon> Add Category
        </button>
    </div>

    <div class="filter-tabs">
        <button mat-button [class.active]="filter === 'ALL'" (click)="setFilter('ALL')">
            All Categories
        </button>
        <button mat-button [class.active]="filter === 'INCOME'" (click)="setFilter('INCOME')">
            Income
        </button>
        <button mat-button [class.active]="filter === 'EXPENSE'" (click)="setFilter('EXPENSE')">
            Expense
        </button>
    </div>

    <div class="loading" *ngIf="loading">
        <mat-icon>refresh</mat-icon> Loading categories...
    </div>

    <div class="empty-state" *ngIf="!loading && dataSource.data.length === 0">
        <mat-icon>category</mat-icon>
        <h3>No Categories Yet</h3>
        <p>Create categories to organize your income and expenses.</p>
        <button mat-raised-button color="primary" (click)="createCategory()">
            <mat-icon>add</mat-icon> Add Your First Category
        </button>
    </div>

    <div class="table-container" *ngIf="!loading && dataSource.data.length > 0">
        <table mat-table [dataSource]="dataSource" matSort multiTemplateDataRows class="w-100">
            <!-- Name Column -->
            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
                <td mat-cell *matCellDef="let category" class="fw-semibold">{{ category.name }}</td>
            </ng-container>

            <!-- Type Column -->
            <ng-container matColumnDef="categoryType">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Type</th>
                <td mat-cell *matCellDef="let category">
                    <mat-chip [class.income-chip]="category.categoryType === 'INCOME'"
                        [class.expense-chip]="category.categoryType === 'EXPENSE'">
                        {{ category.categoryType }}
                    </mat-chip>
                </td>
            </ng-container>

            <!-- Parent Category Column -->
            <ng-container matColumnDef="parentCategory">
                <th mat-header-cell *matHeaderCellDef>Parent Category</th>
                <td mat-cell *matCellDef="let category" class="text-muted">{{ category.parentCategoryName || '—' }}</td>
            </ng-container>

            <!-- Color Column -->
            <ng-container matColumnDef="color">
                <th mat-header-cell *matHeaderCellDef>Color</th>
                <td mat-cell *matCellDef="let category">
                    <span class="color-preview" *ngIf="category.color" [style.background-color]="category.color"></span>
                    <span *ngIf="!category.color" class="text-muted">—</span>
                </td>
            </ng-container>

            <!-- Icon Column -->
            <ng-container matColumnDef="icon">
                <th mat-header-cell *matHeaderCellDef>Icon</th>
                <td mat-cell *matCellDef="let category" class="text-muted">{{ category.icon || '—' }}</td>
            </ng-container>

            <!-- Actions Column -->
            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef>Actions</th>
                <td mat-cell *matCellDef="let category" class="actions-cell">
                    <button mat-icon-button (click)="$event.stopPropagation(); expandedElement = expandedElement === category ? null : category"
                        [matTooltip]="expandedElement === category ? 'Hide keywords' : 'Manage keywords'">
                        <mat-icon>{{ expandedElement === category ? 'expand_less' : 'key' }}</mat-icon>
                    </button>
                    <button mat-icon-button color="warn" (click)="$event.stopPropagation(); deleteCategory(category.id, category.name)"
                        matTooltip="Delete category">
                        <mat-icon>delete</mat-icon>
                    </button>
                </td>
            </ng-container>

            <!-- Expanded Content Column -->
            <ng-container matColumnDef="expandedDetail">
                <td mat-cell *matCellDef="let category" [attr.colspan]="displayedColumns.length">
                    <div class="element-detail"
                         [@detailExpand]="category === expandedElement ? 'expanded' : 'collapsed'">
                        <app-category-keywords [category]="category"></app-category-keywords>
                    </div>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"
                class="element-row"
                [class.expanded-row]="expandedElement === row"
                (click)="expandedElement = expandedElement === row ? null : row">
            </tr>
            <tr mat-row *matRowDef="let row; columns: ['expandedDetail']" class="detail-row"></tr>
        </table>

        <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" showFirstLastButtons>
        </mat-paginator>
    </div>
</div>
