<h2 mat-dialog-title>
    <mat-icon>account_balance_wallet</mat-icon>
    {{ isEditMode ? 'Edit Budget' : 'New Budget' }}
</h2>

<mat-dialog-content>
    <form [formGroup]="budgetForm" (ngSubmit)="onSubmit()" class="dialog-form">
        <mat-form-field appearance="outline" class="w-100">
            <mat-label>Category</mat-label>
            <mat-select formControlName="categoryId">
                <mat-option *ngFor="let category of categories" [value]="category.id">{{ category.name }}</mat-option>
            </mat-select>
            <mat-icon matPrefix>label</mat-icon>
            <mat-error *ngIf="budgetForm.get('categoryId')?.hasError('required')">Category is required</mat-error>
        </mat-form-field>

        <div class="row g-3">
            <div class="col-6">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Period Type</mat-label>
                    <mat-select formControlName="periodType">
                        <mat-option *ngFor="let type of periodTypes" [value]="type">{{ type }}</mat-option>
                    </mat-select>
                    <mat-icon matPrefix>date_range</mat-icon>
                </mat-form-field>
            </div>
            <div class="col-6">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Budget Amount</mat-label>
                    <input matInput type="number" formControlName="amount" placeholder="0.00">
                    <mat-icon matPrefix>payments</mat-icon>
                    <mat-error *ngIf="budgetForm.get('amount')?.hasError('required')">Amount is required</mat-error>
                </mat-form-field>
            </div>
        </div>

        <div class="row g-3">
            <div class="col-6">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Start Date</mat-label>
                    <input matInput [matDatepicker]="startPicker" formControlName="periodStart">
                    <mat-datepicker-toggle matIconSuffix [for]="startPicker"></mat-datepicker-toggle>
                    <mat-datepicker #startPicker></mat-datepicker>
                </mat-form-field>
            </div>
            <div class="col-6">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>End Date</mat-label>
                    <input matInput [matDatepicker]="endPicker" formControlName="periodEnd">
                    <mat-datepicker-toggle matIconSuffix [for]="endPicker"></mat-datepicker-toggle>
                    <mat-datepicker #endPicker></mat-datepicker>
                </mat-form-field>
            </div>
        </div>
    </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button (click)="cancel()" [disabled]="loading">Cancel</button>
    <button mat-raised-button color="primary" [disabled]="budgetForm.invalid || loading" (click)="onSubmit()">
        <mat-icon *ngIf="loading">refresh</mat-icon>
        <mat-icon *ngIf="!loading">save</mat-icon>
        {{ isEditMode ? 'Update Budget' : 'Create Budget' }}
    </button>
</mat-dialog-actions>
